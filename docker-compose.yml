version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: policyai-postgres
    environment:
      POSTGRES_USER: policy_admin
      POSTGRES_PASSWORD: policy_password
      POSTGRES_DB: policy_simulator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
